_format_version: "3.0"

consumers:
  - username: flash-sale-auth
    jwt_secrets:
      - key: flash-sale-auth
        algorithm: HS256
        secret: flash-sale-demo-jwt-secret

services:
  - name: auth-service
    url: http://host.docker.internal:8001/api
    routes:
      - name: auth-service-route
        paths:
          - /auth
        strip_path: true

  - name: inventory-service
    url: http://host.docker.internal:8002/api
    routes:
      - name: inventory-service-route
        methods:
          - POST
        paths:
          - /inventory
        strip_path: true
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
                - nbf
          - name: pre-function
            config:
              access:
                - |
                    kong.service.request.clear_header("X-Internal-User-Id")
                    local auth_header = kong.request.get_header("authorization")
                    if not auth_header then
                      return
                    end
                    local token = auth_header:match("[Bb]earer%s+(.+)")
                    if not token then
                      return
                    end
                    local segments = {}
                    for segment in token:gmatch("[^%.]+") do
                      table.insert(segments, segment)
                    end
                    if #segments < 2 then
                      return
                    end
                    local payload_segment = segments[2]:gsub("-", "+"):gsub("_", "/")
                    local remainder = #payload_segment % 4
                    if remainder > 0 then
                      payload_segment = payload_segment .. string.rep("=", 4 - remainder)
                    end
                    local decoded = ngx.decode_base64(payload_segment)
                    if not decoded then
                      return
                    end
                    local cjson = require("cjson.safe")
                    local payload = cjson.decode(decoded)
                    if not payload or not payload.sub then
                      return
                    end
                    kong.service.request.set_header("X-Internal-User-Id", tostring(payload.sub))

  - name: order-service
    url: http://host.docker.internal:8003/api
    routes:
      - name: order-service-route
        methods:
          - POST
        paths:
          - /orders
        strip_path: true
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
                - nbf
          - name: pre-function
            config:
              access:
                - |
                    kong.service.request.clear_header("X-Internal-User-Id")
                    local auth_header = kong.request.get_header("authorization")
                    if not auth_header then
                      return
                    end
                    local token = auth_header:match("[Bb]earer%s+(.+)")
                    if not token then
                      return
                    end
                    local segments = {}
                    for segment in token:gmatch("[^%.]+") do
                      table.insert(segments, segment)
                    end
                    if #segments < 2 then
                      return
                    end
                    local payload_segment = segments[2]:gsub("-", "+"):gsub("_", "/")
                    local remainder = #payload_segment % 4
                    if remainder > 0 then
                      payload_segment = payload_segment .. string.rep("=", 4 - remainder)
                    end
                    local decoded = ngx.decode_base64(payload_segment)
                    if not decoded then
                      return
                    end
                    local cjson = require("cjson.safe")
                    local payload = cjson.decode(decoded)
                    if not payload or not payload.sub then
                      return
                    end
                    kong.service.request.set_header("X-Internal-User-Id", tostring(payload.sub))
