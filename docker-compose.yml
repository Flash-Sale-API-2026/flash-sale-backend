services:
  auth-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: auth-service
    working_dir: /var/www/app
    command:
      - /bin/sh
      - /usr/local/bin/start-laravel-app.sh
    environment:
      APP_DIR: /var/www/app
      APP_PORT: 8000
    volumes:
      - ./apps/auth-service:/var/www/app
      - auth-vendor:/var/www/app/vendor
      - ./docker/app/start-laravel-app.sh:/usr/local/bin/start-laravel-app.sh:ro
    depends_on:
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/up"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - flash-sale

  inventory-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: inventory-service
    working_dir: /var/www/app
    command:
      - /bin/sh
      - /usr/local/bin/start-laravel-app.sh
    environment:
      APP_DIR: /var/www/app
      APP_PORT: 8000
    volumes:
      - ./apps/inventory-service:/var/www/app
      - inventory-vendor:/var/www/app/vendor
      - ./docker/app/start-laravel-app.sh:/usr/local/bin/start-laravel-app.sh:ro
    depends_on:
      inventory-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/up"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - flash-sale

  inventory-order-consumer:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: inventory-order-consumer
    working_dir: /var/www/app
    command:
      - /bin/sh
      - /usr/local/bin/start-laravel-app.sh
      - php
      - artisan
      - inventory:consume-order-events
    environment:
      APP_DIR: /var/www/app
    restart: unless-stopped
    volumes:
      - ./apps/inventory-service:/var/www/app
      - inventory-vendor:/var/www/app/vendor
      - ./docker/app/start-laravel-app.sh:/usr/local/bin/start-laravel-app.sh:ro
    depends_on:
      inventory-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - flash-sale

  order-service:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: order-service
    working_dir: /var/www/app
    command:
      - /bin/sh
      - /usr/local/bin/start-laravel-app.sh
    environment:
      APP_DIR: /var/www/app
      APP_PORT: 8000
    volumes:
      - ./apps/order-service:/var/www/app
      - order-vendor:/var/www/app/vendor
      - ./docker/app/start-laravel-app.sh:/usr/local/bin/start-laravel-app.sh:ro
    depends_on:
      order-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/up"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - flash-sale

  auth-postgres:
    image: postgres:18.3-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: flash_sale
      POSTGRES_PASSWORD: flash_sale
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flash_sale -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash-sale

  inventory-postgres:
    image: postgres:18.3-alpine
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory_service
      POSTGRES_USER: flash_sale
      POSTGRES_PASSWORD: flash_sale
    volumes:
      - inventory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flash_sale -d inventory_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash-sale

  order-postgres:
    image: postgres:18.3-alpine
    container_name: order-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: flash_sale
      POSTGRES_PASSWORD: flash_sale
    volumes:
      - order-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flash_sale -d order_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash-sale

  redis:
    image: redis:8.4.2-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash-sale

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - flash-sale

  debezium:
    image: quay.io/debezium/server:3.4.2.Final
    container_name: debezium
    restart: unless-stopped
    volumes:
      - ./docker/debezium:/debezium/config:ro
      - debezium-data:/debezium/data
    depends_on:
      order-postgres:
        condition: service_healthy
      order-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - flash-sale

  kong:
    image: kong:3.8
    container_name: kong
    entrypoint:
      - /bin/sh
      - /usr/local/kong/dev-config/render-kong-config.sh
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_AUTH_SERVICE_URL: ${KONG_AUTH_SERVICE_URL:-http://auth-service:8000/api}
      KONG_INVENTORY_SERVICE_URL: ${KONG_INVENTORY_SERVICE_URL:-http://inventory-service:8000/api}
      KONG_ORDER_SERVICE_URL: ${KONG_ORDER_SERVICE_URL:-http://order-service:8000/api}
      KONG_JWT_ISSUER: ${JWT_ISSUER:-flash-sale-auth}
      KONG_JWT_SECRET: ${JWT_SECRET:-flash-sale-demo-jwt-secret}
      KONG_TRUSTED_USER_ID_HEADER: ${GATEWAY_USER_ID_HEADER:-X-Internal-User-Id}
    ports:
      - "127.0.0.1:8080:8000"
      - "127.0.0.1:8004:8001"
    volumes:
      - ./docker/kong:/usr/local/kong/dev-config:ro
    depends_on:
      auth-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - flash-sale

volumes:
  auth-vendor:
  auth-postgres-data:
  inventory-vendor:
  inventory-postgres-data:
  order-vendor:
  order-postgres-data:
  debezium-data:
  redis-data:
  rabbitmq-data:

networks:
  flash-sale:
    driver: bridge
