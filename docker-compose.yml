services:
  auth-postgres:
    image: postgres:18.3-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: flash_sale
      POSTGRES_PASSWORD: flash_sale
    ports:
      - "54323:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flash_sale -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash-sale

  inventory-postgres:
    image: postgres:18.3-alpine
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory_service
      POSTGRES_USER: flash_sale
      POSTGRES_PASSWORD: flash_sale
    ports:
      - "54321:5432"
    volumes:
      - inventory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flash_sale -d inventory_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash-sale

  order-postgres:
    image: postgres:18.3-alpine
    container_name: order-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: flash_sale
      POSTGRES_PASSWORD: flash_sale
    ports:
      - "54322:5432"
    volumes:
      - order-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flash_sale -d order_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash-sale

  redis:
    image: redis:8.4.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash-sale

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: flash_sale
      RABBITMQ_DEFAULT_PASS: flash_sale
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - flash-sale

  kong:
    image: kong:3.8
    container_name: kong
    entrypoint:
      - /bin/sh
      - /usr/local/kong/dev-config/render-kong-config.sh
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_AUTH_SERVICE_URL: ${KONG_AUTH_SERVICE_URL:-http://host.docker.internal:8001/api}
      KONG_INVENTORY_SERVICE_URL: ${KONG_INVENTORY_SERVICE_URL:-http://host.docker.internal:8002/api}
      KONG_ORDER_SERVICE_URL: ${KONG_ORDER_SERVICE_URL:-http://host.docker.internal:8003/api}
      KONG_JWT_ISSUER: ${JWT_ISSUER:-flash-sale-auth}
      KONG_JWT_SECRET: ${JWT_SECRET:-flash-sale-demo-jwt-secret}
      KONG_TRUSTED_USER_ID_HEADER: ${GATEWAY_USER_ID_HEADER:-X-Internal-User-Id}
    ports:
      - "127.0.0.1:8080:8000"
      - "127.0.0.1:8004:8001"
    volumes:
      - ./docker/kong:/usr/local/kong/dev-config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - flash-sale

volumes:
  auth-postgres-data:
  inventory-postgres-data:
  order-postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  flash-sale:
    driver: bridge
